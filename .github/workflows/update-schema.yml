name: Update from Schema Release

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: read

env:
  CODEGEN_IMAGE: ghcr.io/nrel-sienna/power-codegen:latest

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest schema release
        id: schema
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh release view --repo NREL-Sienna/SiennaSchemas --json tagName -q .tagName)
          CURRENT=$(cat .schema-version 2>/dev/null || echo "none")
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "changed=$( [ "$LATEST" != "$CURRENT" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Download schemas
        if: steps.schema.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ steps.schema.outputs.latest }} \
            --repo NREL-Sienna/SiennaSchemas --pattern '*.tar.gz' --dir /tmp
          tar -xzf /tmp/schemas-*.tar.gz -C /tmp

      - name: Login to GHCR
        if: steps.schema.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Regenerate Julia types via codegen container
        if: steps.schema.outputs.changed == 'true'
        run: |
          docker run --rm \
            -v /tmp/schemas:/schemas:ro \
            -v ${{ github.workspace }}:/output \
            $CODEGEN_IMAGE \
            --target julia --schemas /schemas --output /output
          echo "${{ steps.schema.outputs.latest }}" > .schema-version

      - uses: julia-actions/setup-julia@v2
        if: steps.schema.outputs.changed == 'true'
        with:
          version: "1"

      - name: Run tests
        if: steps.schema.outputs.changed == 'true'
        run: |
          julia -e '
            using Pkg
            Pkg.develop([
              PackageSpec(path="PowerCoreOpenAPIModels.jl"),
              PackageSpec(path="PowerOperationsOpenAPIModels.jl"),
              PackageSpec(path="PowerInvestmentsOpenAPIModels.jl"),
              PackageSpec(path="PowerDynamicsOpenAPIModels.jl"),
              PackageSpec(path="PowerOpenAPIModels.jl"),
            ])
            Pkg.test("PowerOpenAPIModels")
          '

      - name: Open Pull Request
        if: steps.schema.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/schema-${{ steps.schema.outputs.latest }}
          title: "chore: update to schema ${{ steps.schema.outputs.latest }}"
          body: |
            Auto-generated from [SiennaSchemas ${{ steps.schema.outputs.latest }}](https://github.com/NREL-Sienna/SiennaSchemas/releases/tag/${{ steps.schema.outputs.latest }}).
          commit-message: "chore: regenerate types from schema ${{ steps.schema.outputs.latest }}"
